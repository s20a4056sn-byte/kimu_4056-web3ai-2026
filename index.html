<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;URL='./lectures/lecture5/index.html'">
    <title>オヤココへ移動中...</title>
    <style>
        body {
            background-color: #090d16;
            color: #f1f5f9;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #5f5dec;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #a5b4fc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>オヤココ（第5回プロトタイプ）へ自動移動しています...</p>
        <p><small>自動的に移動しない場合は、<a href="./lectures/lecture5/index.html">こちらをクリックしてください</a>。</small></p>
    </div>
</body>
</html>
